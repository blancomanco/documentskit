<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Die Files</title>

    <!-- Fonts: Instrument Serif + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">Light</button>
    <main class="page">
      <section class="center">
        <h1 class="title">Documents</h1>
        <p class="subtitle">View our documents</p>

        <div class="search-wrap">
          <div class="search">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.5 3a7.5 7.5 0 1 0 4.6 13.4l4.75 4.75 1.06-1.06-4.75-4.75A7.5 7.5 0 0 0 10.5 3Zm0 1.5a6 6 0 1 1 0 12a6 6 0 0 1 0-12Z"
              />
            </svg>
            <input
              id="searchInput"
              type="text"
              placeholder="Search for a user"
            />
          </div>
        </div>

        <div class="table">
          <div class="thead">
            <div>User</div>
            <div>Posted at</div>
            <div>Entries</div>
          </div>
          <div id="tbody" class="tbody"></div>
        </div>
      </section>
    </main>

    <!-- Modal -->
    <div id="modalBackdrop" class="modal-backdrop" aria-hidden="true">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <div class="modal-top">
          <h2 id="modalTitle" class="modal-title">—</h2>
          <button id="closeBtn" class="close-btn" type="button">Close</button>
        </div>

        <div class="modal-body">
          <div class="section">
            <div class="section-title">System Info</div>
            <div id="sysInfo" class="kv"></div>
          </div>

          <div class="section">
            <div class="section-title">Browser</div>
            <div id="filesBrowser" class="file-list"></div>
          </div>

          <div class="section">
            <div class="section-title">Discord</div>
            <div id="filesDiscord" class="file-list"></div>
          </div>

          <div class="section">
            <div class="section-title">Documents</div>
            <div id="filesDocuments" class="file-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
